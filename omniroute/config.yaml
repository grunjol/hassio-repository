name: "OmniRoute"
version: "3.8.48"
slug: "omniroute"
description: "Unified AI proxy. Route any LLM through one endpoint — 250+ providers, 90+ free."
url: "https://github.com/diegosouzapw/OmniRoute"
arch:
  - aarch64
  - amd64
init: false
startup: services
ingress: true
ingress_port: 20128
map:
  - type: addon_config
    read_only: false
    path: /app/data
ports:
  20128/tcp: 20128
ports_description:
  20128/tcp: "OmniRoute API and Dashboard"
options:
  PORT: 20128
  AUTH_COOKIE_SECURE: "false"
  OMNIROUTE_ALLOW_PRIVATE_PROVIDER_URLS: "false"
  OMNIROUTE_MEMORY_MB: 1024
schema:
  PORT: port
  AUTH_COOKIE_SECURE: list(true|false)
  OMNIROUTE_ALLOW_PRIVATE_PROVIDER_URLS: list(true|false)
  OMNIROUTE_MEMORY_MB: int
image: diegosouzapw/omniroute
